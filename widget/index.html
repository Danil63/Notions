<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Hexlet Progress</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="widget">
  <!-- Табы -->
  <div class="header">
    <div class="tabs">
      <button class="tab active" data-tab="day">День</button>
      <button class="tab" data-tab="week">Неделя</button>
    </div>
  </div>

  <!-- Таб: День -->
  <div class="tab-content active" id="tab-day">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="day-topics-fill"></div>
    </div>
    <div class="info-cards">
      <div class="info-card" id="day-topics-card">
        <div class="value"><span id="day-topics-done">0</span> / <span id="day-topics-goal">0</span></div>
        <div class="label">тем сегодня</div>
      </div>
      <div class="info-card" id="day-hours-card">
        <div class="value" id="day-hours-left">0ч 0м 0с</div>
        <div class="label">до конца дня</div>
      </div>
      <div class="info-card">
        <div class="value" id="day-rate">0</div>
        <div class="label">тем / день</div>
      </div>
    </div>
    <div class="tasks-container" id="tasks-container"></div>
  </div>

  <!-- Таб: Неделя -->
  <div class="tab-content" id="tab-week">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="week-topics-fill"></div>
    </div>
    <div class="info-cards">
      <div class="info-card">
        <div class="value"><span id="week-topics-done">0</span> / <span id="week-topics-goal">0</span></div>
        <div class="label">тем за неделю</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-weeks-left">0</div>
        <div class="label">недель осталось</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-rate">0</div>
        <div class="label">тем / неделю</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
