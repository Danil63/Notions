<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexlet Progress</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: transparent;
    padding: 8px 0;
  }

  .widget {
    width: 100%;
  }

  /* Табы */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }

  .tab {
    padding: 8px 24px;
    border: none;
    background: #f1f1f0;
    color: #787774;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  .tab:hover {
    background: #e8e8e6;
    color: #37352f;
  }

  .tab.active {
    background: #37352f;
    color: #ffffff;
  }

  /* Контент табов */
  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  /* Прогресс-бар */
  .progress-section {
    width: 100%;
    margin-bottom: 20px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 14px;
    color: #37352f;
  }

  .progress-label .title {
    font-weight: 600;
  }

  .progress-label .percentage {
    font-weight: 700;
    font-size: 16px;
  }

  .progress-bar-track {
    width: 100%;
    height: 28px;
    background: #f1f1f0;
    border-radius: 14px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 1s ease-in-out;
    min-width: 0;
  }

  .topics-fill {
    background: linear-gradient(90deg, #2eaadc, #6c5ce7);
  }

  .projects-fill {
    background: linear-gradient(90deg, #00b894, #fdcb6e);
  }

  .progress-info {
    margin-top: 8px;
    font-size: 13px;
    color: #787774;
    display: flex;
    justify-content: space-between;
  }

  .progress-info span {
    font-weight: 600;
    color: #37352f;
  }

  .course-title {
    font-size: 15px;
    font-weight: 600;
    color: #37352f;
    margin-bottom: 16px;
  }

  .deadline-info {
    margin-top: 16px;
    padding: 10px 14px;
    background: #f7f6f3;
    border-radius: 8px;
    font-size: 13px;
    color: #787774;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .deadline-info span {
    font-weight: 600;
    color: #37352f;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="course-title">Автоматизатор тестирования на Python</div>

  <!-- Табы -->
  <div class="tabs">
    <button class="tab active" data-tab="day">День</button>
    <button class="tab" data-tab="week">Неделя</button>
  </div>

  <!-- Таб: День -->
  <div class="tab-content active" id="tab-day">
    <!-- Темы -->
    <div class="progress-section">
      <div class="progress-label">
        <span class="title">Темы на сегодня</span>
        <span class="percentage" id="day-topics-percent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill topics-fill" id="day-topics-fill"></div>
      </div>
      <div class="progress-info">
        <span id="day-topics-done">0</span> из <span id="day-topics-goal">0</span> тем
      </div>
    </div>

    <!-- Проекты -->
    <div class="progress-section">
      <div class="progress-label">
        <span class="title">Проекты</span>
        <span class="percentage" id="day-projects-percent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill projects-fill" id="day-projects-fill"></div>
      </div>
      <div class="progress-info">
        <span id="day-projects-done">0</span> из <span id="day-projects-total">0</span> проектов
      </div>
    </div>

    <div class="deadline-info">
      <div>Дедлайн: <span id="day-deadline"></span></div>
      <div>Осталось: <span id="day-days-left"></span> дн.</div>
      <div>Темп: <span id="day-rate"></span> тем/день</div>
    </div>
  </div>

  <!-- Таб: Неделя -->
  <div class="tab-content" id="tab-week">
    <!-- Темы -->
    <div class="progress-section">
      <div class="progress-label">
        <span class="title">Темы на неделю</span>
        <span class="percentage" id="week-topics-percent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill topics-fill" id="week-topics-fill"></div>
      </div>
      <div class="progress-info">
        <span id="week-topics-done">0</span> из <span id="week-topics-goal">0</span> тем
      </div>
    </div>

    <!-- Проекты -->
    <div class="progress-section">
      <div class="progress-label">
        <span class="title">Проекты</span>
        <span class="percentage" id="week-projects-percent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill projects-fill" id="week-projects-fill"></div>
      </div>
      <div class="progress-info">
        <span id="week-projects-done">0</span> из <span id="week-projects-total">0</span> проектов
      </div>
    </div>

    <div class="deadline-info">
      <div>Дедлайн: <span id="week-deadline"></span></div>
      <div>Осталось: <span id="week-weeks-left"></span> нед.</div>
      <div>Темп: <span id="week-rate"></span> тем/нед.</div>
    </div>
  </div>
</div>

<script>
  // ===== ДАННЫЕ HEXLET — обновляй эти значения =====
  const COURSE = {
    topicsTotal: 407,       // всего тем в курсе
    topicsDone: 150,        // пройдено тем
    projectsTotal: 3,       // всего проектов
    projectsDone: 1,        // сделано проектов
    deadline: '2026-07-11', // дедлайн
    dailyTopicsDone: 0,     // тем пройдено сегодня
    weeklyTopicsDone: 0,    // тем пройдено на этой неделе
  };
  // =================================================

  // Переключение табов
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  function updateProgress() {
    const now = new Date();
    const deadline = new Date(COURSE.deadline);
    const msPerDay = 86400000;
    const daysLeft = Math.max(0, Math.ceil((deadline - now) / msPerDay));
    const weeksLeft = Math.max(1, Math.ceil(daysLeft / 7));
    const topicsLeft = COURSE.topicsTotal - COURSE.topicsDone;

    // Необходимый темп
    const dailyRate = daysLeft > 0 ? Math.ceil(topicsLeft / daysLeft) : topicsLeft;
    const weeklyRate = Math.ceil(topicsLeft / weeksLeft);

    // --- Таб "День" ---
    const dayGoal = dailyRate;
    const dayDone = COURSE.dailyTopicsDone;
    const dayPercent = dayGoal > 0 ? Math.min(100, Math.round((dayDone / dayGoal) * 100)) : 0;

    document.getElementById('day-topics-percent').textContent = dayPercent + '%';
    document.getElementById('day-topics-fill').style.width = dayPercent + '%';
    document.getElementById('day-topics-done').textContent = dayDone;
    document.getElementById('day-topics-goal').textContent = dayGoal;

    const projPercent = COURSE.projectsTotal > 0
      ? Math.round((COURSE.projectsDone / COURSE.projectsTotal) * 100) : 0;

    document.getElementById('day-projects-percent').textContent = projPercent + '%';
    document.getElementById('day-projects-fill').style.width = projPercent + '%';
    document.getElementById('day-projects-done').textContent = COURSE.projectsDone;
    document.getElementById('day-projects-total').textContent = COURSE.projectsTotal;

    document.getElementById('day-deadline').textContent = formatDate(deadline);
    document.getElementById('day-days-left').textContent = daysLeft;
    document.getElementById('day-rate').textContent = dailyRate;

    // --- Таб "Неделя" ---
    const weekGoal = weeklyRate;
    const weekDone = COURSE.weeklyTopicsDone;
    const weekPercent = weekGoal > 0 ? Math.min(100, Math.round((weekDone / weekGoal) * 100)) : 0;

    document.getElementById('week-topics-percent').textContent = weekPercent + '%';
    document.getElementById('week-topics-fill').style.width = weekPercent + '%';
    document.getElementById('week-topics-done').textContent = weekDone;
    document.getElementById('week-topics-goal').textContent = weekGoal;

    document.getElementById('week-projects-percent').textContent = projPercent + '%';
    document.getElementById('week-projects-fill').style.width = projPercent + '%';
    document.getElementById('week-projects-done').textContent = COURSE.projectsDone;
    document.getElementById('week-projects-total').textContent = COURSE.projectsTotal;

    document.getElementById('week-deadline').textContent = formatDate(deadline);
    document.getElementById('week-weeks-left').textContent = weeksLeft;
    document.getElementById('week-rate').textContent = weeklyRate;
  }

  function formatDate(date) {
    const months = ['янв', 'фев', 'мар', 'апр', 'мая', 'июн',
                    'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
    return date.getDate() + ' ' + months[date.getMonth()] + ' ' + date.getFullYear();
  }

  updateProgress();
</script>

</body>
</html>
