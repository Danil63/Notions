<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexlet Progress</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: transparent;
    padding: 8px 0;
  }

  .widget {
    width: 100%;
  }

  /* Заголовок + табы — по центру */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .course-title {
    font-size: 15px;
    font-weight: 600;
    color: #37352f;
  }

  .tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    padding: 6px 20px;
    border: none;
    background: #f1f1f0;
    color: #787774;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  .tab:hover {
    background: #e8e8e6;
    color: #37352f;
  }

  .tab.active {
    background: #37352f;
    color: #ffffff;
  }

  /* Контент табов */
  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  /* Прогресс-бар — на всю ширину */
  .progress-bar-track {
    width: 100%;
    height: 28px;
    background: #f1f1f0;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 1s ease-in-out;
    min-width: 0;
    background: linear-gradient(90deg, #2eaadc, #6c5ce7);
  }

  /* Инфо-карточки — по центру */
  .info-cards {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    max-width: 520px;
    margin: 0 auto;
  }

  .info-card {
    background: #f7f6f3;
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
    min-width: 100px;
    flex: 1;
    transition: background 0.3s ease;
  }

  .info-card .value {
    font-size: 20px;
    font-weight: 700;
    color: #37352f;
    line-height: 1.2;
  }

  .info-card .label {
    font-size: 11px;
    color: #9b9a97;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="widget">
  <!-- Заголовок + табы -->
  <div class="header">
    <span class="course-title">Автоматизатор тестирования на Python</span>
    <div class="tabs">
      <button class="tab active" data-tab="day">День</button>
      <button class="tab" data-tab="week">Неделя</button>
    </div>
  </div>

  <!-- Таб: День -->
  <div class="tab-content active" id="tab-day">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="day-topics-fill"></div>
    </div>
    <div class="info-cards">
      <div class="info-card" id="day-topics-card">
        <div class="value"><span id="day-topics-done">0</span> / <span id="day-topics-goal">0</span></div>
        <div class="label">тем сегодня</div>
      </div>
      <div class="info-card">
        <div class="value" id="day-topics-percent">0%</div>
        <div class="label">выполнено</div>
      </div>
      <div class="info-card">
        <div class="value" id="day-days-left">0</div>
        <div class="label">дней до дедлайна</div>
      </div>
      <div class="info-card">
        <div class="value" id="day-rate">0</div>
        <div class="label">тем / день</div>
      </div>
    </div>
  </div>

  <!-- Таб: Неделя -->
  <div class="tab-content" id="tab-week">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="week-topics-fill"></div>
    </div>
    <div class="info-cards">
      <div class="info-card">
        <div class="value"><span id="week-topics-done">0</span> / <span id="week-topics-goal">0</span></div>
        <div class="label">тем за неделю</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-topics-percent">0%</div>
        <div class="label">выполнено</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-weeks-left">0</div>
        <div class="label">недель осталось</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-rate">0</div>
        <div class="label">тем / неделю</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== ДАННЫЕ HEXLET — обновляй эти значения =====
  const COURSE = {
    topicsTotal: 407,
    topicsDone: 150,
    deadline: '2026-07-11',
    dailyTopicsDone: 0,
    weeklyTopicsDone: 0,
  };
  // =================================================

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  function updateProgress() {
    const now = new Date();
    const deadline = new Date(COURSE.deadline);
    const msPerDay = 86400000;
    const daysLeft = Math.max(0, Math.ceil((deadline - now) / msPerDay));
    const weeksLeft = Math.max(1, Math.ceil(daysLeft / 7));
    const topicsLeft = COURSE.topicsTotal - COURSE.topicsDone;

    const dailyRate = daysLeft > 0 ? Math.ceil(topicsLeft / daysLeft) : topicsLeft;
    const weeklyRate = Math.ceil(topicsLeft / weeksLeft);

    // День
    const dayGoal = dailyRate;
    const dayDone = COURSE.dailyTopicsDone;
    const dayPercent = dayGoal > 0 ? Math.min(100, Math.round((dayDone / dayGoal) * 100)) : 0;

    document.getElementById('day-topics-percent').textContent = dayPercent + '%';
    document.getElementById('day-topics-fill').style.width = dayPercent + '%';
    document.getElementById('day-topics-done').textContent = dayDone;
    document.getElementById('day-topics-goal').textContent = dayGoal;
    document.getElementById('day-days-left').textContent = daysLeft;
    document.getElementById('day-rate').textContent = dailyRate;

    // Цвет карточки "тем сегодня"
    const card = document.getElementById('day-topics-card');
    if (dayDone <= 1) {
      card.style.background = 'rgba(235, 59, 59, 0.2)';
    } else if (dayDone === 2) {
      card.style.background = 'rgba(245, 197, 24, 0.2)';
    } else {
      card.style.background = 'rgba(109, 189, 153, 0.2)';
    }

    // Неделя
    const weekGoal = weeklyRate;
    const weekDone = COURSE.weeklyTopicsDone;
    const weekPercent = weekGoal > 0 ? Math.min(100, Math.round((weekDone / weekGoal) * 100)) : 0;

    document.getElementById('week-topics-percent').textContent = weekPercent + '%';
    document.getElementById('week-topics-fill').style.width = weekPercent + '%';
    document.getElementById('week-topics-done').textContent = weekDone;
    document.getElementById('week-topics-goal').textContent = weekGoal;
    document.getElementById('week-weeks-left').textContent = weeksLeft;
    document.getElementById('week-rate').textContent = weeklyRate;
  }

  updateProgress();
</script>

</body>
</html>
