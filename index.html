<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Hexlet Progress</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: transparent;
    padding: 8px 0;
  }

  .widget {
    width: 100%;
  }

  /* Заголовок + табы — по центру */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    padding: 6px 20px;
    border: none;
    background: #f1f1f0;
    color: #787774;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  .tab:hover {
    background: #e8e8e6;
    color: #37352f;
  }

  .tab.active {
    background: #37352f;
    color: #ffffff;
  }

  /* Контент табов */
  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  /* Прогресс-бар — на всю ширину */
  .progress-bar-track {
    width: 100%;
    height: 28px;
    background: #f1f1f0;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 0.5s ease-in-out;
    min-width: 0;
    background: #007FFF;
  }

  /* Инфо-карточки — по центру */
  .info-cards {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    max-width: 520px;
    margin: 0 auto;
  }

  .info-card {
    background: #f7f6f3;
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
    min-width: 100px;
    flex: 1;
    transition: background 0.3s ease;
  }

  .info-card .value {
    font-size: 20px;
    font-weight: 700;
    color: #37352f;
    line-height: 1.2;
  }

  .info-card .label {
    font-size: 11px;
    color: #9b9a97;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== Task list ===== */
  .tasks-container {
    max-width: 520px;
    margin: 14px auto 0;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f7f6f3;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 6px;
    transition: background 0.2s ease, opacity 0.2s ease;
  }

  .task-item:hover {
    background: #eeedeb;
  }

  .task-item.done {
    opacity: 0.55;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: #9b9a97;
  }

  .task-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #c4c4c2;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    background: transparent;
  }

  .task-checkbox:hover {
    border-color: #007FFF;
  }

  .task-checkbox.checked {
    background: #007FFF;
    border-color: #007FFF;
  }

  .task-checkbox.checked::after {
    content: '';
    width: 5px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-bottom: 2px;
  }

  .task-text {
    font-size: 14px;
    color: #37352f;
    line-height: 1.4;
    flex: 1;
    word-break: break-word;
  }

  .task-delete {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: #c4c4c2;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    transition: all 0.15s ease;
    line-height: 1;
  }

  .task-item:hover .task-delete {
    opacity: 1;
  }

  .task-delete:hover {
    background: rgba(235, 59, 59, 0.15);
    color: #eb3b3b;
  }

  /* Кнопка "Добавить задачу" */
  .add-task-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 10px 14px;
    border: 2px dashed #d8d8d6;
    background: transparent;
    border-radius: 10px;
    color: #9b9a97;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 2px;
  }

  .add-task-btn:hover {
    border-color: #007FFF;
    color: #007FFF;
    background: rgba(0, 127, 255, 0.04);
  }

  .add-task-btn .plus-icon {
    font-size: 16px;
    font-weight: 600;
    line-height: 1;
  }

  /* Инпут для ввода задачи */
  .add-task-input-wrap {
    display: none;
    margin-top: 2px;
  }

  .add-task-input-wrap.visible {
    display: block;
  }

  .add-task-input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #007FFF;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: #37352f;
    outline: none;
    background: #fff;
    transition: border-color 0.2s ease;
  }

  .add-task-input::placeholder {
    color: #b8b8b5;
  }

  .add-task-input:focus {
    border-color: #007FFF;
  }
</style>
</head>
<body>

<div class="widget">
  <!-- Табы -->
  <div class="header">
    <div class="tabs">
      <button class="tab active" data-tab="day">День</button>
      <button class="tab" data-tab="week">Неделя</button>
    </div>
  </div>

  <!-- Таб: День -->
  <div class="tab-content active" id="tab-day">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="day-topics-fill"></div>
    </div>
    <div class="info-cards">
      <div class="info-card" id="day-topics-card">
        <div class="value"><span id="day-topics-done">0</span> / <span id="day-topics-goal">0</span></div>
        <div class="label">тем сегодня</div>
      </div>
      <div class="info-card" id="day-hours-card">
        <div class="value" id="day-hours-left">0ч 0м 0с</div>
        <div class="label">до конца дня</div>
      </div>
      <div class="info-card">
        <div class="value" id="day-rate">0</div>
        <div class="label">тем / день</div>
      </div>
    </div>

    <!-- Список задач -->
    <div class="tasks-container" id="tasks-container"></div>
  </div>

  <!-- Таб: Неделя -->
  <div class="tab-content" id="tab-week">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="week-topics-fill"></div>
    </div>
    <div class="info-cards">
      <div class="info-card">
        <div class="value"><span id="week-topics-done">0</span> / <span id="week-topics-goal">0</span></div>
        <div class="label">тем за неделю</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-weeks-left">0</div>
        <div class="label">недель осталось</div>
      </div>
      <div class="info-card">
        <div class="value" id="week-rate">0</div>
        <div class="label">тем / неделю</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== WEEK CONFIG (kept for Неделя tab) =====
  const WEEK_CONFIG = {
    topicsTotal: 407,
    topicsDone: 150,
    deadline: '2026-07-11',
    weeklyTopicsDone: 0,
  };

  // ===== TASK MANAGEMENT =====
  const MAX_TASKS = 5;
  const STORAGE_KEY = 'notion_day_tasks';

  function getTodayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const data = JSON.parse(raw);
      // Daily reset: if saved date differs from today, clear tasks
      if (data.date !== getTodayKey()) {
        localStorage.removeItem(STORAGE_KEY);
        return [];
      }
      return data.tasks || [];
    } catch (e) {
      return [];
    }
  }

  function saveTasks(tasks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      date: getTodayKey(),
      tasks: tasks
    }));
  }

  let tasks = loadTasks();

  function getTaskCounts() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    return { total, done };
  }

  function renderTasks() {
    const container = document.getElementById('tasks-container');
    container.innerHTML = '';

    // Render each task
    tasks.forEach((task, index) => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');

      const checkbox = document.createElement('div');
      checkbox.className = 'task-checkbox' + (task.done ? ' checked' : '');
      checkbox.addEventListener('click', () => {
        tasks[index].done = !tasks[index].done;
        saveTasks(tasks);
        renderTasks();
        updateDayProgress();
      });

      const text = document.createElement('div');
      text.className = 'task-text';
      text.textContent = task.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'task-delete';
      deleteBtn.innerHTML = '&#215;';
      deleteBtn.title = 'Удалить';
      deleteBtn.addEventListener('click', () => {
        tasks.splice(index, 1);
        saveTasks(tasks);
        renderTasks();
        updateDayProgress();
      });

      item.appendChild(checkbox);
      item.appendChild(text);
      item.appendChild(deleteBtn);
      container.appendChild(item);
    });

    // "Добавить задачу" button (only if < MAX_TASKS)
    if (tasks.length < MAX_TASKS) {
      // Button
      const addBtn = document.createElement('button');
      addBtn.className = 'add-task-btn';
      addBtn.id = 'add-task-btn';
      addBtn.innerHTML = '<span class="plus-icon">+</span> Добавить задачу';
      addBtn.addEventListener('click', () => {
        addBtn.style.display = 'none';
        inputWrap.classList.add('visible');
        input.focus();
      });

      // Input wrapper
      const inputWrap = document.createElement('div');
      inputWrap.className = 'add-task-input-wrap';

      const input = document.createElement('input');
      input.className = 'add-task-input';
      input.type = 'text';
      input.placeholder = 'Название задачи...';
      input.maxLength = 100;

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const val = input.value.trim();
          if (val) {
            tasks.push({ text: val, done: false });
            saveTasks(tasks);
            renderTasks();
            updateDayProgress();
          }
        } else if (e.key === 'Escape') {
          inputWrap.classList.remove('visible');
          addBtn.style.display = '';
        }
      });

      input.addEventListener('blur', () => {
        // Slight delay so click events on other elements can fire
        setTimeout(() => {
          const val = input.value.trim();
          if (val) {
            tasks.push({ text: val, done: false });
            saveTasks(tasks);
            renderTasks();
            updateDayProgress();
          } else {
            inputWrap.classList.remove('visible');
            addBtn.style.display = '';
          }
        }, 150);
      });

      inputWrap.appendChild(input);
      container.appendChild(addBtn);
      container.appendChild(inputWrap);
    }
  }

  // ===== TABS =====
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ===== DAY PROGRESS =====
  function updateDayProgress() {
    const { total, done } = getTaskCounts();
    const dayGoal = total;
    const dayDone = done;
    const dayPercent = dayGoal > 0 ? Math.min(100, Math.round((dayDone / dayGoal) * 100)) : 0;
    const tasksDone = dayGoal > 0 && dayDone >= dayGoal;

    document.getElementById('day-topics-done').textContent = dayDone;
    document.getElementById('day-topics-goal').textContent = dayGoal;
    document.getElementById('day-rate').textContent = dayGoal;

    // Progress bar
    document.getElementById('day-topics-fill').style.width = dayPercent + '%';

    // Color for "тем сегодня" card
    const topicsCard = document.getElementById('day-topics-card');
    if (dayDone <= 1) {
      topicsCard.style.background = 'rgba(235, 59, 59, 0.2)';
    } else if (dayDone === 2) {
      topicsCard.style.background = 'rgba(245, 197, 24, 0.2)';
    } else {
      topicsCard.style.background = 'rgba(109, 189, 153, 0.2)';
    }

    // Color for "до конца дня" card
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const hoursCard = document.getElementById('day-hours-card');
    if (tasksDone) {
      hoursCard.style.background = 'rgba(109, 189, 153, 0.2)';
    } else if (hours >= 9 && (hours < 14 || (hours === 14 && minutes === 0))) {
      hoursCard.style.background = 'rgba(46, 204, 113, 0.2)';
    } else if (hours >= 14 && (hours < 19 || (hours === 19 && minutes === 0))) {
      hoursCard.style.background = 'rgba(245, 197, 24, 0.2)';
    } else if (hours >= 19) {
      hoursCard.style.background = 'rgba(235, 59, 59, 0.2)';
    } else {
      hoursCard.style.background = '#f7f6f3';
    }
  }

  // ===== TIMER (до конца дня) =====
  function updateTimer() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const seconds = now.getSeconds();
    const currentSeconds = hours * 3600 + minutes * 60 + seconds;
    const endOfDay = 23 * 3600 + 59 * 60 + 59;
    const secsLeft = Math.max(0, endOfDay - currentSeconds);
    const hoursLeft = Math.floor(secsLeft / 3600);
    const minsLeft = Math.floor((secsLeft % 3600) / 60);
    const secLeft = secsLeft % 60;
    document.getElementById('day-hours-left').textContent =
      hoursLeft + 'ч ' + minsLeft + 'м ' + secLeft + 'с';

    // Check for midnight reset
    if (hours === 0 && minutes === 0 && seconds === 0) {
      tasks = loadTasks(); // will return [] if date changed
      renderTasks();
      updateDayProgress();
    }
  }

  // ===== WEEK PROGRESS =====
  function updateWeekProgress() {
    const now = new Date();
    const deadline = new Date(WEEK_CONFIG.deadline);
    const msPerDay = 86400000;
    const daysLeft = Math.max(0, Math.ceil((deadline - now) / msPerDay));
    const weeksLeft = Math.max(1, Math.ceil(daysLeft / 7));
    const topicsLeft = WEEK_CONFIG.topicsTotal - WEEK_CONFIG.topicsDone;
    const weeklyRate = Math.ceil(topicsLeft / weeksLeft);

    const weekGoal = weeklyRate;
    const weekDone = WEEK_CONFIG.weeklyTopicsDone;
    const weekPercent = weekGoal > 0 ? Math.min(100, Math.round((weekDone / weekGoal) * 100)) : 0;

    document.getElementById('week-topics-fill').style.width = weekPercent + '%';
    document.getElementById('week-topics-done').textContent = weekDone;
    document.getElementById('week-topics-goal').textContent = weekGoal;
    document.getElementById('week-weeks-left').textContent = weeksLeft;
    document.getElementById('week-rate').textContent = weeklyRate;
  }

  // ===== MAIN TICK =====
  function tick() {
    updateTimer();
    updateDayProgress();
  }

  // ===== INIT =====
  renderTasks();
  updateDayProgress();
  updateWeekProgress();
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
